    description: >-
      Segmind Fashion AI is an AI-powered in-painting service that edits the clothing region of an image based on a text
      prompt. It accepts an input image (auto center-cropped and resized to 512x512), a text prompt, and an optional
      clothing region selector (topwear or bottomwear). Authentication is via the x-api-key header.
